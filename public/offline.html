<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UClean — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0F1E;
      color: #CBD5E1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    img { width: 160px; margin-bottom: 32px; }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #F1F5F9;
      margin-bottom: 10px;
    }
    p {
      font-size: 1rem;
      color: #94A3B8;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      background: #16A34A;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #15803D; }
    .tip {
      margin-top: 24px;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <img src="/uclean-logo.png" alt="UClean" onerror="this.style.display='none'" />
  <div class="icon">📶</div>
  <h1>You're Offline</h1>
  <p>No internet connection detected. Please reconnect and try again.</p>
  <button onclick="location.reload()">Try Again</button>
  <p class="tip">Tip: open this page once while online — it will work offline next time.</p>
</body>
</html>
